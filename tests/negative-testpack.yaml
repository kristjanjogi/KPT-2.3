- id: NT-21
  title: extension code used as substitute for required standard code
  category: extension-invalid
  fixture_type: single-trace-invalid
  input:
    summary: System uses an X-* extension code instead of a required standard code.
  context:
    zone: analytical
    profile: KPT-H
    deployment_mode: General
  invalid_state:
    decision_state: qualify
    basis_codes:
    - X-ORG-SOURCE-LIMITED
    qualification_type: source_limited
    execution_relevance: execution_relevance=false
  expected_failure_reason:
  - Extension codes MUST NOT substitute for required standard basis codes

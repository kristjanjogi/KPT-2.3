cases:
  - case_id: "ROB-MIXED-QUAL-001"
    title: "Partial sources plus verification requirement should produce mixed qualification"
    route_type: "human"
    input_ref: "rob_input_001"
    output_ref: "rob_output_001"
    context:
      zone: "analytical"
      profile: "KPT-A"
      deployment_mode: "General"
      execution_relevant: false
      user_visible: true
      downstream_target: "display"
    candidate_output:
      candidate_id: "rob_cand_001"
      content_type: "text"
      content: "The quarterly trend appears positive, but the underlying source packet is incomplete and still needs verification."
    provenance:
      source_class: "partial_sources"
      primary_source_present: false
      verification_required: true
      combine_limitations: true
    policy:
      allow_safe_replacement: false
    expected:
      decision_state: "qualify"
      basis_codes: ["EPI-UNCERTAIN", "SRC-NO-PRIMARY", "VER-REQUIRED"]
      qualification_type: "mixed"
      enforcement:
        display_allowed: true
        display_mode: "qualified"
        execution_allowed: false
        execution_mode: "not_applicable"
        replacement_required: false
      trace_count: 1


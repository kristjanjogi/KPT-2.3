        execution_allowed: false
        execution_mode: "block"
        replacement_required: false
      trace_count: 1

  - case_id: "H-REPLACEMENT-DUAL-TRACE-001"
    title: "Blocked candidate plus safe replacement with two traces"
    route_type: "human"
    input_ref: "input_h_dual_trace_001"
    output_ref: "output_h_dual_trace_001"

    context:
      zone: "analytical"
      profile: "KPT-A"
      deployment_mode: "General"
      execution_relevant: false
      user_visible: true
      downstream_target: "display"

    candidate_output:
      candidate_id: "cand_h_dual_trace_001"
      content_type: "text"
